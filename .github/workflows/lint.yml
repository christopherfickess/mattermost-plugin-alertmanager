# Runs golangci-lint with the project's .golangci.yml config.
# Lint failures gate merges — keeps the codebase consistent across
# contributors and catches the unused-import / dead-code / fmt-arity
# class of bugs that compile but break downstream.
name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      # Pin to action v6.5.2 (last release that supports golangci-lint v1.x).
      # action >= v7 dropped v1 support and requires golangci-lint v2, which
      # uses an incompatible config schema. Migration to v2 is a separate
      # task — the v1 config in .golangci.yml stays valid here.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@8564da7cb3c6866ed1da648ca8f00a258ef0c802 # v6.5.2
        with:
          version: v1.62.0
          args: --timeout=5m
